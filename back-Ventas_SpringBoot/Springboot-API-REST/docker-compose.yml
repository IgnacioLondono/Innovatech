services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DB_ENDPOINT: ${DB_ENDPOINT:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-innovatech}
      DB_USERNAME: ${DB_USERNAME:-app}
      DB_PASSWORD: ${DB_PASSWORD:-apppass}
