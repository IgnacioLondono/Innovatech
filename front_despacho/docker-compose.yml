services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NGINX_CONF: standalone
        # Desde el navegador del host: ajusta a la IP pública/privada de tus APIs en AWS.
        VITE_API_DESPACHOS_URL: ${VITE_API_DESPACHOS_URL:-http://127.0.0.1:8081}
        VITE_API_VENTAS_URL: ${VITE_API_VENTAS_URL:-http://127.0.0.1:8080}
    ports:
      - "${FRONT_PORT:-80}:8080"
