# EP2 — CI/CD: build Docker, push a ECR y despliegue en EC2 (rama deploy).
# Este archivo debe vivir en la raíz del repo: https://github.com/IgnacioLondono/Innovatech

name: Deploy backend (Docker + ECR + EC2)

on:
  push:
    branches: [deploy]
    paths:
      - "back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/**"
      - ".github/workflows/deploy-backend-despacho.yml"

permissions:
  contents: read

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Desplegar en EC2 (SSH)
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ env.ECR_REPOSITORY }}
          AWS_REG: ${{ secrets.AWS_REGION }}
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: REGISTRY,REPO,AWS_REG
          script: |
            set -e
            aws ecr get-login-password --region "$AWS_REG" | docker login --username AWS --password-stdin "$REGISTRY"
            docker pull "$REGISTRY/$REPO:latest"
            docker stop despacho-api 2>/dev/null || true
            docker rm despacho-api 2>/dev/null || true
            docker run -d --name despacho-api --restart unless-stopped \
              -p 8081:8081 \
              -e DB_ENDPOINT="${{ secrets.DB_ENDPOINT }}" \
              -e DB_PORT="${{ secrets.DB_PORT }}" \
              -e DB_NAME="${{ secrets.DB_NAME }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              "$REGISTRY/$REPO:latest"
